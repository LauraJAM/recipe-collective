<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Recipe Collective</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #fdf6ec;
      --warm-white: #fffaf4;
      --tan: #e8d5b7;
      --gold: #c9882a;
      --dark-gold: #a06820;
      --rust: #b5541e;
      --brown: #5c3d1e;
      --dark-brown: #2e1c0a;
      --sage: #7a8c6e;
      --text: #3a2410;
      --text-light: #7a5c3a;
      --border: #d4b896;
      --shadow: rgba(92, 61, 30, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--cream);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(201,136,42,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(181,84,30,0.06) 0%, transparent 60%);
    }

    /* HEADER */
    header {
      background: var(--brown);
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }

    .logo {
      display: flex;
      flex-direction: column;
    }

    .logo-main {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: var(--tan);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .logo-sub {
      font-size: 0.7rem;
      color: var(--gold);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--dark-brown);
    }

    .btn-primary:hover { background: var(--dark-gold); color: white; }

    .btn-secondary {
      background: transparent;
      color: var(--tan);
      border: 1px solid rgba(228, 213, 183, 0.35);
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.08); }

    .btn-danger {
      background: var(--rust);
      color: white;
      padding: 8px 16px;
      font-size: 0.78rem;
    }

    .btn-danger:hover { background: #8f3c10; }

    .btn-ghost {
      background: transparent;
      color: var(--text-light);
      border: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 0.78rem;
    }

    .btn-ghost:hover { background: var(--tan); color: var(--brown); }

    /* MAIN CONTENT */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    /* SEARCH + FILTER BAR */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 40px;
    }

    .search-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      background: var(--warm-white);
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--gold); }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 1.1rem;
      pointer-events: none;
    }

    .tags-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-light);
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.04em;
    }

    .tag-btn:hover { border-color: var(--gold); color: var(--gold); }
    .tag-btn.active { background: var(--gold); border-color: var(--gold); color: white; font-weight: 700; }

    /* RECIPE GRID */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 28px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--brown);
    }

    .recipe-count {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    .recipe-card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .recipe-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px var(--shadow);
    }

    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: var(--tan);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      font-size: 2.5rem;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 20px;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--brown);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--text-light);
      line-height: 1.5;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      gap: 14px;
      font-size: 0.78rem;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-pill {
      padding: 3px 10px;
      background: rgba(201,136,42,0.1);
      border: 1px solid rgba(201,136,42,0.25);
      border-radius: 12px;
      font-size: 0.72rem;
      color: var(--dark-gold);
      letter-spacing: 0.03em;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }

    .empty-state .emoji { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--brown); margin-bottom: 8px; }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-light);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
    }

    /* MODAL OVERLAY */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(46, 28, 10, 0.55);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--warm-white);
      border-radius: 10px;
      width: 100%;
      max-width: 720px;
      margin: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--brown);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-light);
      padding: 4px;
      line-height: 1;
    }

    .modal-close:hover { color: var(--rust); }

    .modal-body { padding: 28px 32px; }

    /* FORMS */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: var(--cream);
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus { border-color: var(--gold); }

    textarea { resize: vertical; min-height: 120px; line-height: 1.6; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .tags-select-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-checkbox {
      display: none;
    }

    .tag-checkbox + label {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-transform: none;
      color: var(--text-light);
      transition: all 0.15s;
      margin: 0;
    }

    .tag-checkbox:checked + label {
      background: var(--gold);
      border-color: var(--gold);
      color: white;
      font-weight: 700;
    }

    .url-extract-row {
      display: flex;
      gap: 10px;
    }

    .url-extract-row input { flex: 1; }

    .extract-status {
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--sage);
      font-style: italic;
    }

    .extract-status.error { color: var(--rust); }

    .modal-footer {
      padding: 20px 32px 28px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid var(--border);
    }

    /* RECIPE DETAIL MODAL */
    .recipe-detail-image {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 8px 8px 0 0;
    }

    .recipe-detail-image-placeholder {
      width: 100%;
      height: 160px;
      background: var(--tan);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      border-radius: 8px 8px 0 0;
    }

    .recipe-meta-bar {
      display: flex;
      gap: 24px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .meta-value {
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 400;
    }

    .recipe-section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--brown);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--tan);
    }

    .ingredients-list {
      list-style: none;
      margin-bottom: 28px;
    }

    .ingredients-list li {
      padding: 7px 0;
      border-bottom: 1px solid rgba(212, 184, 150, 0.4);
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text);
    }

    .steps-list {
      list-style: none;
      margin-bottom: 24px;
    }

    .steps-list li {
      padding: 10px 0 10px 0;
      border-bottom: 1px solid rgba(212, 184, 150, 0.4);
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
    }

    .notes-box {
      background: rgba(201,136,42,0.07);
      border-left: 3px solid var(--gold);
      padding: 14px 18px;
      border-radius: 0 6px 6px 0;
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .added-by {
      font-size: 0.8rem;
      color: var(--text-light);
      font-style: italic;
      text-align: right;
      margin-top: 8px;
    }

    .source-link {
      font-size: 0.82rem;
      color: var(--gold);
      text-decoration: none;
    }

    .source-link:hover { text-decoration: underline; }

    /* Toaster */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--brown);
      color: var(--tan);
      padding: 14px 22px;
      border-radius: 6px;
      font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    /* Responsive */
    @media (max-width: 640px) {
      header { padding: 20px; }
      main { padding: 28px 20px; }
      .form-row { grid-template-columns: 1fr; }
      .modal-body, .modal-header, .modal-footer { padding-left: 20px; padding-right: 20px; }
      .recipe-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-main">The Recipe Collective</div>
    <div class="logo-sub">A shared kitchen, together</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Recipe</button>
  </div>
</header>

<main>
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="Search recipes..." oninput="filterRecipes()" />
    </div>
    <div class="tags-filter" id="tagsFilter"></div>
  </div>

  <div class="section-header">
    <h2 class="section-title">All Recipes</h2>
    <span class="recipe-count" id="recipeCount"></span>
  </div>

  <div id="recipeGrid" class="recipe-grid">
    <div class="loading">Loading recipes...</div>
  </div>
</main>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Add a Recipe</h2>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Recipe URL <span style="font-weight:300;text-transform:none;letter-spacing:0">(optional — paste to auto-fill)</span></label>
        <div class="url-extract-row">
          <input type="url" id="recipeUrl" placeholder="https://..." />
          <button class="btn btn-primary" onclick="extractFromUrl()">Extract</button>
        </div>
        <div class="extract-status" id="extractStatus"></div>
      </div>

      <div class="form-group">
        <label>Recipe Name *</label>
        <input type="text" id="formName" placeholder="e.g. Grandma's Chicken Soup" />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="formDescription" rows="2" placeholder="A short description of the dish..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Prep + Cook Time</label>
          <input type="text" id="formPrepTime" placeholder="e.g. 45 minutes" />
        </div>
        <div class="form-group">
          <label>Servings</label>
          <input type="text" id="formServings" placeholder="e.g. 6 servings" />
        </div>
      </div>

      <div class="form-group">
        <label>Ingredients *</label>
        <textarea id="formIngredients" rows="6" placeholder="One ingredient per line&#10;e.g.&#10;2 cups flour&#10;1 tsp salt&#10;3 eggs"></textarea>
      </div>

      <div class="form-group">
        <label>Steps *</label>
        <textarea id="formSteps" rows="8" placeholder="Numbered steps, one per line&#10;e.g.&#10;1. Preheat oven to 350°F&#10;2. Mix dry ingredients..."></textarea>
      </div>

      <div class="form-group">
        <label>Notes / Tips</label>
        <textarea id="formNotes" rows="3" placeholder="Any helpful tips, substitutions, or notes..."></textarea>
      </div>

      <div class="form-group">
        <label>Image URL <span style="font-weight:300;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="url" id="formImageUrl" placeholder="https://..." />
      </div>

      <div class="form-group">
        <label>Added By</label>
        <input type="text" id="formAddedBy" placeholder="Your name" />
      </div>

      <div class="form-group">
        <label>Tags</label>
        <div class="tags-select-grid" id="formTagsGrid"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecipe()">Save Recipe</button>
    </div>
  </div>
</div>

<!-- RECIPE DETAIL MODAL -->
<div class="overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<div id="toast"></div>

<script>
  const ALL_TAGS = [
    "Breakfast","Lunch","Dinner","Snack","Dessert",
    "Under 30 Minutes","One Pan","Sheet Pan","Slow Cooker",
    "Make Ahead","Freezer Friendly","Kid Friendly","Vegetarian","Favorites"
  ];

  let allRecipes = [];
  let activeTagFilter = null;
  let editingRecipeId = null;

  // ---- INIT ----
  async function init() {
    renderTagFilters();
    renderFormTags();
    await loadRecipes();
  }

  // ---- LOAD RECIPES ----
  async function loadRecipes() {
    try {
      const res = await fetch('/.netlify/functions/recipes');
      allRecipes = await res.json();
      filterRecipes();
    } catch (e) {
      document.getElementById('recipeGrid').innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><h3>Could not load recipes</h3><p>Check your connection and try refreshing.</p></div>';
    }
  }

  // ---- FILTER ----
  function filterRecipes() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allRecipes;

    if (activeTagFilter) {
      filtered = filtered.filter(r => (r.fields.Tags || []).includes(activeTagFilter));
    }

    if (q) {
      filtered = filtered.filter(r => {
        const name = (r.fields.Name || '').toLowerCase();
        const desc = (r.fields.Description || '').toLowerCase();
        const tags = (r.fields.Tags || []).join(' ').toLowerCase();
        return name.includes(q) || desc.includes(q) || tags.includes(q);
      });
    }

    renderGrid(filtered);
    document.getElementById('recipeCount').textContent = `${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}`;
  }

  // ---- RENDER TAG FILTERS ----
  function renderTagFilters() {
    const wrap = document.getElementById('tagsFilter');
    ALL_TAGS.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'tag-btn';
      btn.textContent = tag;
      btn.onclick = () => {
        if (activeTagFilter === tag) {
          activeTagFilter = null;
          btn.classList.remove('active');
        } else {
          document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
          activeTagFilter = tag;
          btn.classList.add('active');
        }
        filterRecipes();
      };
      wrap.appendChild(btn);
    });
  }

  // ---- RENDER FORM TAGS ----
  function renderFormTags() {
    const grid = document.getElementById('formTagsGrid');
    ALL_TAGS.forEach(tag => {
      const id = 'tag_' + tag.replace(/\s+/g,'_');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'tag-checkbox';
      cb.id = id;
      cb.value = tag;
      const lbl = document.createElement('label');
      lbl.htmlFor = id;
      lbl.textContent = tag;
      grid.appendChild(cb);
      grid.appendChild(lbl);
    });
  }

  // ---- RENDER GRID ----
  function renderGrid(recipes) {
    const grid = document.getElementById('recipeGrid');
    if (!recipes.length) {
      grid.innerHTML = '<div class="empty-state"><div class="emoji">🍽️</div><h3>No recipes yet</h3><p>Add the first recipe to get started!</p></div>';
      return;
    }

    grid.innerHTML = recipes.map(r => {
      const f = r.fields;
      const tags = (f.Tags || []).slice(0, 3).map(t => `<span class="tag-pill">${t}</span>`).join('');
      const imageHtml = f['Image URL']
        ? `<div class="card-image"><img src="${esc(f['Image URL'])}" alt="${esc(f.Name)}" onerror="this.parentElement.textContent='🍴'" /></div>`
        : `<div class="card-image">🍴</div>`;

      return `
        <div class="recipe-card" onclick="openDetail('${r.id}')">
          ${imageHtml}
          <div class="card-body">
            <div class="card-name">${esc(f.Name || 'Untitled')}</div>
            ${f.Description ? `<div class="card-desc">${esc(f.Description)}</div>` : ''}
            <div class="card-meta">
              ${f['Prep Time'] ? `<span>⏱ ${esc(f['Prep Time'])}</span>` : ''}
              ${f.Servings ? `<span>🍽 ${esc(f.Servings)}</span>` : ''}
              ${f['Added By'] ? `<span>👤 ${esc(f['Added By'])}</span>` : ''}
            </div>
            ${tags ? `<div class="card-tags">${tags}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ---- RECIPE DETAIL ----
  function openDetail(id) {
    const recipe = allRecipes.find(r => r.id === id);
    if (!recipe) return;
    const f = recipe.fields;

    const imageHtml = f['Image URL']
      ? `<img class="recipe-detail-image" src="${esc(f['Image URL'])}" alt="${esc(f.Name)}" onerror="this.style.display='none'" />`
      : `<div class="recipe-detail-image-placeholder">🍴</div>`;

    const tags = (f.Tags || []).map(t => `<span class="tag-pill">${t}</span>`).join(' ');

    const ingredients = (f.Ingredients || '').split('\n').filter(Boolean).map(i => `<li>${esc(i)}</li>`).join('');
    const steps = (f.Steps || '').split('\n').filter(Boolean).map(s => `<li>${esc(s)}</li>`).join('');

    document.getElementById('detailContent').innerHTML = `
      ${imageHtml}
      <div class="modal-header">
        <div>
          <h2 class="modal-title">${esc(f.Name || 'Untitled')}</h2>
          ${f.URL ? `<a class="source-link" href="${esc(f.URL)}" target="_blank" rel="noopener">View original source ↗</a>` : ''}
        </div>
        <button class="modal-close" onclick="closeDetailModal()">✕</button>
      </div>
      <div class="modal-body">
        ${f.Description ? `<p style="color:var(--text-light);margin-bottom:16px;line-height:1.6">${esc(f.Description)}</p>` : ''}
        <div class="recipe-meta-bar">
          ${f['Prep Time'] ? `<div class="meta-item"><span class="meta-label">Time</span><span class="meta-value">⏱ ${esc(f['Prep Time'])}</span></div>` : ''}
          ${f.Servings ? `<div class="meta-item"><span class="meta-label">Serves</span><span class="meta-value">${esc(f.Servings)}</span></div>` : ''}
          ${f['Added By'] ? `<div class="meta-item"><span class="meta-label">Added by</span><span class="meta-value">${esc(f['Added By'])}</span></div>` : ''}
        </div>
        ${tags ? `<div style="margin-bottom:24px;display:flex;flex-wrap:wrap;gap:6px">${tags}</div>` : ''}
        ${ingredients ? `<div><div class="recipe-section-title">Ingredients</div><ul class="ingredients-list">${ingredients}</ul></div>` : ''}
        ${steps ? `<div><div class="recipe-section-title">Steps</div><ol class="steps-list">${steps}</ol></div>` : ''}
        ${f.Notes ? `<div class="notes-box">📝 ${esc(f.Notes)}</div>` : ''}
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" onclick="deleteRecipe('${id}')">Delete</button>
        <button class="btn btn-ghost" onclick="openEditModal('${id}')">Edit</button>
        <button class="btn btn-ghost" onclick="closeDetailModal()">Close</button>
      </div>`;

    document.getElementById('detailModal').classList.add('open');
  }

  function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('open');
  }

  // ---- ADD MODAL ----
  function openAddModal() {
    editingRecipeId = null;
    document.getElementById('modalTitle').textContent = 'Add a Recipe';
    clearForm();
    document.getElementById('addModal').classList.add('open');
  }

  function closeAddModal() {
    document.getElementById('addModal').classList.remove('open');
    editingRecipeId = null;
  }

  function clearForm() {
    ['recipeUrl','formName','formDescription','formPrepTime','formServings',
     'formIngredients','formSteps','formNotes','formImageUrl','formAddedBy'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.querySelectorAll('.tag-checkbox').forEach(cb => cb.checked = false);
    document.getElementById('extractStatus').textContent = '';
  }

  // ---- EDIT MODAL ----
  function openEditModal(id) {
    closeDetailModal();
    const recipe = allRecipes.find(r => r.id === id);
    if (!recipe) return;
    const f = recipe.fields;

    editingRecipeId = id;
    document.getElementById('modalTitle').textContent = 'Edit Recipe';
    document.getElementById('recipeUrl').value = f.URL || '';
    document.getElementById('formName').value = f.Name || '';
    document.getElementById('formDescription').value = f.Description || '';
    document.getElementById('formPrepTime').value = f['Prep Time'] || '';
    document.getElementById('formServings').value = f.Servings || '';
    document.getElementById('formIngredients').value = f.Ingredients || '';
    document.getElementById('formSteps').value = f.Steps || '';
    document.getElementById('formNotes').value = f.Notes || '';
    document.getElementById('formImageUrl').value = f['Image URL'] || '';
    document.getElementById('formAddedBy').value = f['Added By'] || '';

    const selectedTags = f.Tags || [];
    document.querySelectorAll('.tag-checkbox').forEach(cb => {
      cb.checked = selectedTags.includes(cb.value);
    });

    document.getElementById('addModal').classList.add('open');
  }

  // ---- EXTRACT FROM URL ----
  async function extractFromUrl() {
    const url = document.getElementById('recipeUrl').value.trim();
    if (!url) { showToast('Paste a URL first'); return; }

    const status = document.getElementById('extractStatus');
    status.className = 'extract-status';
    status.textContent = 'Extracting recipe...';

    try {
      const res = await fetch('/api/extract-recipe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      if (!res.ok) throw new Error('Extraction failed');
      const data = await res.json();

      document.getElementById('formName').value = data.name || '';
      document.getElementById('formDescription').value = data.description || '';
      document.getElementById('formPrepTime').value = data.prepTime || '';
      document.getElementById('formServings').value = data.servings || '';
      document.getElementById('formIngredients').value = data.ingredients || '';
      document.getElementById('formSteps').value = data.steps || '';
      document.getElementById('formNotes').value = data.notes || '';
      document.getElementById('formImageUrl').value = data.imageUrl || '';

      const suggested = data.suggestedTags || [];
      document.querySelectorAll('.tag-checkbox').forEach(cb => {
        cb.checked = suggested.includes(cb.value);
      });

      status.textContent = 'Recipe extracted! Review and edit before saving.';
    } catch (e) {
      status.className = 'extract-status error';
      status.textContent = 'Could not extract recipe. Try filling in manually.';
    }
  }

  // ---- SAVE RECIPE ----
  async function saveRecipe() {
    const name = document.getElementById('formName').value.trim();
    if (!name) { showToast('Recipe name is required'); return; }

    const selectedTags = [...document.querySelectorAll('.tag-checkbox:checked')].map(cb => cb.value);

    const fields = {
      'Name': name,
      'URL': document.getElementById('recipeUrl').value.trim() || undefined,
      'Description': document.getElementById('formDescription').value.trim() || undefined,
      'Prep Time': document.getElementById('formPrepTime').value.trim() || undefined,
      'Servings': document.getElementById('formServings').value.trim() || undefined,
      'Ingredients': document.getElementById('formIngredients').value.trim() || undefined,
      'Steps': document.getElementById('formSteps').value.trim() || undefined,
      'Notes': document.getElementById('formNotes').value.trim() || undefined,
      'Image URL': document.getElementById('formImageUrl').value.trim() || undefined,
      'Added By': document.getElementById('formAddedBy').value.trim() || undefined,
      'Tags': selectedTags.length ? selectedTags : undefined,
    };

    // Remove undefined
    Object.keys(fields).forEach(k => fields[k] === undefined && delete fields[k]);

    try {
      if (editingRecipeId) {
        const res = await fetch('/.netlify/functions/recipes', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: editingRecipeId, ...fields })
        });
        if (!res.ok) throw new Error();
        showToast('Recipe updated!');
      } else {
        const res = await fetch('/.netlify/functions/recipes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fields)
        });
        if (!res.ok) throw new Error();
        showToast('Recipe added!');
      }

      closeAddModal();
      await loadRecipes();
    } catch (e) {
      showToast('Something went wrong. Try again.');
    }
  }

  // ---- DELETE RECIPE ----
  async function deleteRecipe(id) {
    if (!confirm('Delete this recipe? This cannot be undone.')) return;
    try {
      const res = await fetch(`/.netlify/functions/recipes?id=${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      closeDetailModal();
      showToast('Recipe deleted');
      await loadRecipes();
    } catch (e) {
      showToast('Could not delete recipe');
    }
  }

  // ---- UTILS ----
  function esc(str) {
    return (str || '').toString()
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Close modals on overlay click
  document.getElementById('addModal').addEventListener('click', function(e) {
    if (e.target === this) closeAddModal();
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeDetailModal();
  });

  init();
</script>
</body>
</html>
