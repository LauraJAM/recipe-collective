<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Recipe Collective</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --forest: #1e3a2f;
      --forest-mid: #2d5240;
      --forest-light: #3d6b52;
      --oat: #f5f0e8;
      --oat-dark: #ede6d6;
      --oat-deeper: #ddd4be;
      --amber: #c47f2a;
      --amber-light: #d9963e;
      --amber-pale: rgba(196,127,42,0.12);
      --text: #1a2e22;
      --text-mid: #3d5248;
      --text-light: #6b8070;
      --border: #cec5b0;
      --shadow: rgba(30, 58, 47, 0.14);
      --card-bg: #faf7f2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--oat);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--forest);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 24px rgba(0,0,0,0.3);
    }

    .logo-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: var(--oat);
      letter-spacing: 0.01em;
      line-height: 1;
    }

    .logo-sub {
      font-size: 0.68rem;
      color: var(--amber-light);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      font-weight: 500;
      transition: all 0.18s;
    }

    .btn-primary {
      background: var(--amber);
      color: white;
    }
    .btn-primary:hover { background: var(--amber-light); }

    .btn-secondary {
      background: transparent;
      color: var(--oat);
      border: 1px solid rgba(245,240,232,0.3);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); }

    .btn-select-mode {
      background: transparent;
      color: var(--oat-dark);
      border: 1px solid rgba(245,240,232,0.3);
    }
    .btn-select-mode.active {
      background: var(--forest-light);
      color: white;
      border-color: var(--forest-light);
    }
    .btn-select-mode:hover { background: rgba(255,255,255,0.08); }

    .btn-danger {
      background: #7a3020;
      color: white;
      padding: 8px 16px;
      font-size: 0.78rem;
    }
    .btn-danger:hover { background: #5e2218; }

    .btn-ghost {
      background: transparent;
      color: var(--text-mid);
      border: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 0.78rem;
    }
    .btn-ghost:hover { background: var(--oat-dark); }

    .btn-forest {
      background: var(--forest);
      color: var(--oat);
      padding: 8px 16px;
      font-size: 0.78rem;
    }
    .btn-forest:hover { background: var(--forest-mid); }

    /* SELECT MODE BAR */
    .select-bar {
      display: none;
      background: var(--forest-mid);
      padding: 14px 40px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .select-bar.visible { display: flex; }

    .select-bar-info {
      color: var(--oat);
      font-size: 0.88rem;
      letter-spacing: 0.04em;
    }

    .select-bar-actions {
      display: flex;
      gap: 10px;
    }

    .btn-export {
      background: var(--amber);
      color: white;
      padding: 8px 18px;
      font-size: 0.78rem;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      transition: background 0.18s;
    }
    .btn-export:hover { background: var(--amber-light); }
    .btn-export:disabled { background: var(--text-light); cursor: not-allowed; }

    /* MAIN */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 44px 40px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 36px;
    }

    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      padding: 13px 20px 13px 46px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      background: var(--card-bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--forest-light); }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 1rem;
      pointer-events: none;
    }

    .tags-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag-btn {
      padding: 5px 13px;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      background: transparent;
      color: var(--text-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .tag-btn:hover { border-color: var(--forest-light); color: var(--forest); }
    .tag-btn.active { background: var(--forest); border-color: var(--forest); color: var(--oat); font-weight: 500; }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 26px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      color: var(--forest);
    }

    .recipe-count {
      font-size: 0.82rem;
      color: var(--text-light);
    }

    /* RECIPE GRID */
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 24px;
    }

    .recipe-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 6px var(--shadow);
      position: relative;
    }

    .recipe-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px var(--shadow);
    }

    /* Select mode card styles */
    .recipe-card.selectable { cursor: default; }
    .recipe-card.selectable .card-body { cursor: pointer; }
    .recipe-card.selected {
      border-color: var(--forest-light);
      box-shadow: 0 0 0 2px var(--forest-light), 0 4px 16px var(--shadow);
    }
    .recipe-card.no-url-select {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .card-select-indicator {
      display: none;
      position: absolute;
      top: 12px;
      right: 12px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--card-bg);
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: white;
      transition: all 0.15s;
    }
    .selectable .card-select-indicator { display: flex; }
    .selected .card-select-indicator {
      background: var(--forest);
      border-color: var(--forest);
    }
    .selected .card-select-indicator::after { content: '✓'; }

    .card-body { padding: 20px; }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      color: var(--forest);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.83rem;
      color: var(--text-light);
      line-height: 1.55;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      gap: 14px;
      font-size: 0.76rem;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag-pill {
      padding: 3px 9px;
      background: rgba(30,58,47,0.07);
      border: 1px solid rgba(30,58,47,0.15);
      border-radius: 2px;
      font-size: 0.7rem;
      color: var(--forest-mid);
      letter-spacing: 0.03em;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .empty-state .emoji { font-size: 2.8rem; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--forest); margin-bottom: 8px; }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-light);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
    }

    /* MODAL */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 40, 28, 0.6);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--card-bg);
      border-radius: 6px;
      width: 100%;
      max-width: 720px;
      margin: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      animation: slideUp 0.22s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      padding: 26px 32px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      color: var(--forest);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--text-light);
      padding: 4px;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 26px 32px; }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      background: var(--oat);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--forest-light); }

    textarea { resize: vertical; min-height: 110px; line-height: 1.6; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .tags-select-grid { display: flex; flex-wrap: wrap; gap: 7px; }

    .tag-checkbox { display: none; }

    .tag-checkbox + label {
      padding: 5px 13px;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-transform: none;
      color: var(--text-light);
      transition: all 0.14s;
      margin: 0;
    }
    .tag-checkbox:checked + label {
      background: var(--forest);
      border-color: var(--forest);
      color: var(--oat);
      font-weight: 500;
    }

    .url-extract-row { display: flex; gap: 10px; }
    .url-extract-row input { flex: 1; }

    .extract-status {
      margin-top: 8px;
      font-size: 0.83rem;
      color: var(--forest-light);
      font-style: italic;
    }
    .extract-status.error { color: #7a3020; }

    .modal-footer {
      padding: 18px 32px 26px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid var(--border);
    }

    /* DETAIL MODAL */
    .recipe-meta-bar {
      display: flex;
      gap: 24px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .meta-item { display: flex; flex-direction: column; gap: 2px; }

    .meta-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .meta-value { font-size: 0.93rem; color: var(--text); }

    .recipe-section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      color: var(--forest);
      margin-bottom: 12px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--oat-deeper);
    }

    .ingredients-list { list-style: none; margin-bottom: 26px; }
    .ingredients-list li {
      padding: 7px 0;
      border-bottom: 1px solid rgba(206,197,176,0.5);
      font-size: 0.93rem;
      line-height: 1.5;
      color: var(--text);
    }

    .steps-list { list-style: none; margin-bottom: 22px; }
    .steps-list li {
      padding: 9px 0;
      border-bottom: 1px solid rgba(206,197,176,0.5);
      font-size: 0.93rem;
      line-height: 1.6;
      color: var(--text);
    }

    .notes-box {
      background: rgba(196,127,42,0.07);
      border-left: 3px solid var(--amber);
      padding: 13px 17px;
      border-radius: 0 4px 4px 0;
      font-size: 0.88rem;
      color: var(--text-mid);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .source-link {
      font-size: 0.8rem;
      color: var(--amber);
      text-decoration: none;
    }
    .source-link:hover { text-decoration: underline; }

    /* EXPORT MODAL */
    .export-output {
      width: 100%;
      min-height: 200px;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      background: var(--oat);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.8;
      resize: vertical;
    }

    .export-note {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-top: 8px;
      font-style: italic;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 26px;
      right: 26px;
      background: var(--forest);
      color: var(--oat);
      padding: 13px 20px;
      border-radius: 4px;
      font-size: 0.88rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 640px) {
      header { padding: 18px 20px; }
      main { padding: 28px 20px; }
      .select-bar { padding: 12px 20px; flex-direction: column; align-items: flex-start; }
      .form-row { grid-template-columns: 1fr; }
      .modal-body, .modal-header, .modal-footer { padding-left: 20px; padding-right: 20px; }
      .recipe-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-main">The Recipe Collective</div>
    <div class="logo-sub">A shared kitchen, together</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-select-mode" id="selectModeBtn" onclick="toggleSelectMode()">Select</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Recipe</button>
  </div>
</header>

<!-- SELECT MODE BAR -->
<div class="select-bar" id="selectBar">
  <span class="select-bar-info" id="selectBarInfo">0 recipes selected</span>
  <div class="select-bar-actions">
    <button class="btn-export" id="exportUrlsBtn" onclick="openExportModal()" disabled>Export URLs</button>
    <button class="btn-export" onclick="selectAll()" style="background:var(--forest-mid);">Select All</button>
    <button class="btn-export" onclick="clearSelection()" style="background:var(--text-light);">Clear</button>
  </div>
</div>

<main>
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="Search recipes..." oninput="filterRecipes()" />
    </div>
    <div class="tags-filter" id="tagsFilter"></div>
  </div>

  <div class="section-header">
    <h2 class="section-title">All Recipes</h2>
    <span class="recipe-count" id="recipeCount"></span>
  </div>

  <div id="recipeGrid" class="recipe-grid">
    <div class="loading">Loading recipes...</div>
  </div>
</main>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Add a Recipe</h2>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Recipe URL <span style="font-weight:300;text-transform:none;letter-spacing:0">(optional — paste to auto-fill)</span></label>
        <div class="url-extract-row">
          <input type="url" id="recipeUrl" placeholder="https://..." />
          <button class="btn btn-primary" onclick="extractFromUrl()">Extract</button>
        </div>
        <div class="extract-status" id="extractStatus"></div>
      </div>

      <div class="form-group">
        <label>Recipe Name *</label>
        <input type="text" id="formName" placeholder="e.g. Grandma's Chicken Soup" />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="formDescription" rows="2" placeholder="A short description of the dish..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Prep + Cook Time</label>
          <input type="text" id="formPrepTime" placeholder="e.g. 45 minutes" />
        </div>
        <div class="form-group">
          <label>Servings</label>
          <input type="text" id="formServings" placeholder="e.g. 6 servings" />
        </div>
      </div>

      <div class="form-group">
        <label>Ingredients *</label>
        <textarea id="formIngredients" rows="6" placeholder="One ingredient per line&#10;e.g.&#10;2 cups flour&#10;1 tsp salt&#10;3 eggs"></textarea>
      </div>

      <div class="form-group">
        <label>Steps *</label>
        <textarea id="formSteps" rows="8" placeholder="Numbered steps, one per line&#10;e.g.&#10;1. Preheat oven to 350°F&#10;2. Mix dry ingredients..."></textarea>
      </div>

      <div class="form-group">
        <label>Notes / Tips</label>
        <textarea id="formNotes" rows="3" placeholder="Any helpful tips, substitutions, or notes..."></textarea>
      </div>

      <div class="form-group">
        <label>Added By</label>
        <input type="text" id="formAddedBy" placeholder="Your name" />
      </div>

      <div class="form-group">
        <label>Tags</label>
        <div class="tags-select-grid" id="formTagsGrid"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecipe()">Save Recipe</button>
    </div>
  </div>
</div>

<!-- RECIPE DETAIL MODAL -->
<div class="overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<!-- EXPORT MODAL -->
<div class="overlay" id="exportModal">
  <div class="modal" style="max-width:580px">
    <div class="modal-header">
      <h2 class="modal-title">Export Recipes</h2>
      <button class="modal-close" onclick="closeExportModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.88rem;color:var(--text-light);margin-bottom:18px;">Copy and paste this list into an email or message.</p>
      <textarea class="export-output" id="exportOutput" readonly></textarea>
      <p class="export-note">Recipes without a source URL are not included.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeExportModal()">Close</button>
      <button class="btn btn-primary" onclick="copyExport()">Copy to Clipboard</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const ALL_TAGS = [
    "Breakfast","Lunch","Dinner","Snack","Dessert",
    "Under 30 Minutes","One Pan","Sheet Pan","Slow Cooker",
    "Make Ahead","Freezer Friendly","Kid Friendly","Vegetarian","Favorites"
  ];

  let allRecipes = [];
  let activeTagFilter = null;
  let editingRecipeId = null;
  let selectMode = false;
  let selectedIds = new Set();

  // ---- INIT ----
  async function init() {
    renderTagFilters();
    renderFormTags();
    await loadRecipes();
  }

  // ---- LOAD RECIPES ----
  async function loadRecipes() {
    try {
      const res = await fetch('/.netlify/functions/recipes');
      allRecipes = await res.json();
      filterRecipes();
    } catch (e) {
      document.getElementById('recipeGrid').innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><h3>Could not load recipes</h3><p>Check your connection and try refreshing.</p></div>';
    }
  }

  // ---- FILTER ----
  function filterRecipes() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allRecipes;

    if (activeTagFilter) {
      filtered = filtered.filter(r => (r.fields.Tags || []).includes(activeTagFilter));
    }

    if (q) {
      filtered = filtered.filter(r => {
        const name = (r.fields.Name || '').toLowerCase();
        const desc = (r.fields.Description || '').toLowerCase();
        const tags = (r.fields.Tags || []).join(' ').toLowerCase();
        return name.includes(q) || desc.includes(q) || tags.includes(q);
      });
    }

    renderGrid(filtered);
    document.getElementById('recipeCount').textContent = `${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}`;
  }

  // ---- RENDER TAG FILTERS ----
  function renderTagFilters() {
    const wrap = document.getElementById('tagsFilter');
    ALL_TAGS.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'tag-btn';
      btn.textContent = tag;
      btn.onclick = () => {
        if (activeTagFilter === tag) {
          activeTagFilter = null;
          btn.classList.remove('active');
        } else {
          document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
          activeTagFilter = tag;
          btn.classList.add('active');
        }
        filterRecipes();
      };
      wrap.appendChild(btn);
    });
  }

  // ---- RENDER FORM TAGS ----
  function renderFormTags() {
    const grid = document.getElementById('formTagsGrid');
    ALL_TAGS.forEach(tag => {
      const id = 'tag_' + tag.replace(/\s+/g,'_');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'tag-checkbox';
      cb.id = id;
      cb.value = tag;
      const lbl = document.createElement('label');
      lbl.htmlFor = id;
      lbl.textContent = tag;
      grid.appendChild(cb);
      grid.appendChild(lbl);
    });
  }

  // ---- RENDER GRID ----
  function renderGrid(recipes) {
    const grid = document.getElementById('recipeGrid');
    if (!recipes.length) {
      grid.innerHTML = '<div class="empty-state"><div class="emoji">🍽️</div><h3>No recipes yet</h3><p>Add the first recipe to get started!</p></div>';
      return;
    }

    grid.innerHTML = recipes.map(r => {
      const f = r.fields;
      const tags = (f.Tags || []).slice(0, 3).map(t => `<span class="tag-pill">${t}</span>`).join('');
      const hasUrl = !!f.URL;
      const isSelected = selectedIds.has(r.id);
      const selectableClass = selectMode ? 'selectable' : '';
      const selectedClass = isSelected ? 'selected' : '';
      const noUrlClass = selectMode && !hasUrl ? 'no-url-select' : '';

      let clickHandler = '';
      if (selectMode) {
        if (hasUrl) {
          clickHandler = `onclick="toggleSelect('${r.id}')"`;
        }
      } else {
        clickHandler = `onclick="openDetail('${r.id}')"`;
      }

      return `
        <div class="recipe-card ${selectableClass} ${selectedClass} ${noUrlClass}" ${clickHandler}>
          <div class="card-select-indicator"></div>
          <div class="card-body">
            <div class="card-name">${esc(f.Name || 'Untitled')}</div>
            ${f.Description ? `<div class="card-desc">${esc(f.Description)}</div>` : ''}
            <div class="card-meta">
              ${f['Prep Time'] ? `<span>⏱ ${esc(f['Prep Time'])}</span>` : ''}
              ${f.Servings ? `<span>🍽 ${esc(f.Servings)}</span>` : ''}
              ${f['Added By'] ? `<span>👤 ${esc(f['Added By'])}</span>` : ''}
            </div>
            ${tags ? `<div class="card-tags">${tags}</div>` : ''}
            ${selectMode && !hasUrl ? `<div style="font-size:0.72rem;color:var(--text-light);margin-top:8px;font-style:italic;">No URL — not selectable</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ---- SELECT MODE ----
  function toggleSelectMode() {
    selectMode = !selectMode;
    selectedIds.clear();
    const btn = document.getElementById('selectModeBtn');
    const bar = document.getElementById('selectBar');
    btn.classList.toggle('active', selectMode);
    bar.classList.toggle('visible', selectMode);
    updateSelectBar();
    filterRecipes();
  }

  function toggleSelect(id) {
    if (selectedIds.has(id)) {
      selectedIds.delete(id);
    } else {
      selectedIds.add(id);
    }
    updateSelectBar();
    filterRecipes();
  }

  function selectAll() {
    allRecipes.forEach(r => {
      if (r.fields.URL) selectedIds.add(r.id);
    });
    updateSelectBar();
    filterRecipes();
  }

  function clearSelection() {
    selectedIds.clear();
    updateSelectBar();
    filterRecipes();
  }

  function updateSelectBar() {
    const count = selectedIds.size;
    document.getElementById('selectBarInfo').textContent = `${count} recipe${count !== 1 ? 's' : ''} selected`;
    document.getElementById('exportUrlsBtn').disabled = count === 0;
  }

  // ---- EXPORT MODAL ----
  function openExportModal() {
    const selected = allRecipes.filter(r => selectedIds.has(r.id) && r.fields.URL);
    const text = selected.map(r => `${r.fields.Name}\n${r.fields.URL}`).join('\n\n');
    document.getElementById('exportOutput').value = text;
    document.getElementById('exportModal').classList.add('open');
  }

  function closeExportModal() {
    document.getElementById('exportModal').classList.remove('open');
  }

  function copyExport() {
    const ta = document.getElementById('exportOutput');
    ta.select();
    document.execCommand('copy');
    showToast('Copied to clipboard!');
  }

  // ---- RECIPE DETAIL ----
  function openDetail(id) {
    if (selectMode) return;
    const recipe = allRecipes.find(r => r.id === id);
    if (!recipe) return;
    const f = recipe.fields;

    const tags = (f.Tags || []).map(t => `<span class="tag-pill">${t}</span>`).join(' ');
    const ingredients = (f.Ingredients || '').split('\n').filter(Boolean).map(i => `<li>${esc(i)}</li>`).join('');
    const steps = (f.Steps || '').split('\n').filter(Boolean).map(s => `<li>${esc(s)}</li>`).join('');

    document.getElementById('detailContent').innerHTML = `
      <div class="modal-header">
        <div>
          <h2 class="modal-title">${esc(f.Name || 'Untitled')}</h2>
          ${f.URL ? `<a class="source-link" href="${esc(f.URL)}" target="_blank" rel="noopener">View original source ↗</a>` : ''}
        </div>
        <button class="modal-close" onclick="closeDetailModal()">✕</button>
      </div>
      <div class="modal-body">
        ${f.Description ? `<p style="color:var(--text-light);margin-bottom:16px;line-height:1.6;font-size:0.95rem">${esc(f.Description)}</p>` : ''}
        <div class="recipe-meta-bar">
          ${f['Prep Time'] ? `<div class="meta-item"><span class="meta-label">Time</span><span class="meta-value">⏱ ${esc(f['Prep Time'])}</span></div>` : ''}
          ${f.Servings ? `<div class="meta-item"><span class="meta-label">Serves</span><span class="meta-value">${esc(f.Servings)}</span></div>` : ''}
          ${f['Added By'] ? `<div class="meta-item"><span class="meta-label">Added by</span><span class="meta-value">${esc(f['Added By'])}</span></div>` : ''}
        </div>
        ${tags ? `<div style="margin-bottom:22px;display:flex;flex-wrap:wrap;gap:5px">${tags}</div>` : ''}
        ${ingredients ? `<div><div class="recipe-section-title">Ingredients</div><ul class="ingredients-list">${ingredients}</ul></div>` : ''}
        ${steps ? `<div><div class="recipe-section-title">Steps</div><ol class="steps-list">${steps}</ol></div>` : ''}
        ${f.Notes ? `<div class="notes-box">📝 ${esc(f.Notes)}</div>` : ''}
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" onclick="deleteRecipe('${id}')">Delete</button>
        <button class="btn btn-ghost" onclick="openEditModal('${id}')">Edit</button>
        ${f.URL ? `<button class="btn btn-forest" onclick="exportSinglePdf('${id}')">Export PDF</button>` : ''}
        <button class="btn btn-ghost" onclick="closeDetailModal()">Close</button>
      </div>`;

    document.getElementById('detailModal').classList.add('open');
  }

  function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('open');
  }

  // ---- PDF EXPORT ----
  function exportSinglePdf(id) {
    const recipe = allRecipes.find(r => r.id === id);
    if (!recipe) return;
    const f = recipe.fields;

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>${f.Name || 'Recipe'}</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'DM Sans', sans-serif; font-weight: 300; max-width: 680px; margin: 40px auto; padding: 0 30px; color: #1a2e22; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: #1e3a2f; margin-bottom: 6px; }
  .meta { font-size: 0.85rem; color: #6b8070; margin-bottom: 6px; }
  .url { font-size: 0.8rem; color: #c47f2a; margin-bottom: 20px; }
  .desc { font-size: 0.93rem; color: #3d5248; line-height: 1.6; margin-bottom: 20px; border-left: 3px solid #c47f2a; padding-left: 14px; }
  h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: #1e3a2f; margin: 24px 0 10px; border-bottom: 1px solid #ddd4be; padding-bottom: 5px; }
  ul, ol { padding-left: 18px; }
  li { margin-bottom: 6px; font-size: 0.9rem; line-height: 1.55; }
  .tags { margin-bottom: 20px; }
  .tag { display: inline-block; padding: 2px 9px; background: rgba(30,58,47,0.07); border: 1px solid rgba(30,58,47,0.15); border-radius: 2px; font-size: 0.72rem; color: #2d5240; margin-right: 5px; }
  .notes { background: rgba(196,127,42,0.07); border-left: 3px solid #c47f2a; padding: 12px 16px; font-size: 0.88rem; color: #3d5248; line-height: 1.6; margin-top: 20px; }
  @media print { body { margin: 20px; } }
</style>
</head>
<body>
<h1>${f.Name || 'Untitled'}</h1>
${f['Prep Time'] || f.Servings ? `<div class="meta">${[f['Prep Time'] ? '⏱ ' + f['Prep Time'] : '', f.Servings ? '🍽 ' + f.Servings : ''].filter(Boolean).join('  ·  ')}</div>` : ''}
${f.URL ? `<div class="url">Source: ${f.URL}</div>` : ''}
${f.Description ? `<div class="desc">${f.Description}</div>` : ''}
${(f.Tags || []).length ? `<div class="tags">${(f.Tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
${f.Ingredients ? `<h2>Ingredients</h2><ul>${f.Ingredients.split('\n').filter(Boolean).map(i => `<li>${i}</li>`).join('')}</ul>` : ''}
${f.Steps ? `<h2>Steps</h2><ol>${f.Steps.split('\n').filter(Boolean).map(s => `<li>${s.replace(/^\d+\.\s*/,'')}</li>`).join('')}</ol>` : ''}
${f.Notes ? `<div class="notes">📝 ${f.Notes}</div>` : ''}
${f['Added By'] ? `<p style="font-size:0.78rem;color:#6b8070;margin-top:24px;font-style:italic;">Added by ${f['Added By']}</p>` : ''}
<script>window.onload = () => { window.print(); }<\/script>
</body>
</html>`);
    win.document.close();
  }

  // ---- ADD MODAL ----
  function openAddModal() {
    editingRecipeId = null;
    document.getElementById('modalTitle').textContent = 'Add a Recipe';
    clearForm();
    document.getElementById('addModal').classList.add('open');
  }

  function closeAddModal() {
    document.getElementById('addModal').classList.remove('open');
    editingRecipeId = null;
  }

  function clearForm() {
    ['recipeUrl','formName','formDescription','formPrepTime','formServings',
     'formIngredients','formSteps','formNotes','formAddedBy'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.querySelectorAll('.tag-checkbox').forEach(cb => cb.checked = false);
    document.getElementById('extractStatus').textContent = '';
  }

  // ---- EDIT MODAL ----
  function openEditModal(id) {
    closeDetailModal();
    const recipe = allRecipes.find(r => r.id === id);
    if (!recipe) return;
    const f = recipe.fields;

    editingRecipeId = id;
    document.getElementById('modalTitle').textContent = 'Edit Recipe';
    document.getElementById('recipeUrl').value = f.URL || '';
    document.getElementById('formName').value = f.Name || '';
    document.getElementById('formDescription').value = f.Description || '';
    document.getElementById('formPrepTime').value = f['Prep Time'] || '';
    document.getElementById('formServings').value = f.Servings || '';
    document.getElementById('formIngredients').value = f.Ingredients || '';
    document.getElementById('formSteps').value = f.Steps || '';
    document.getElementById('formNotes').value = f.Notes || '';
    document.getElementById('formAddedBy').value = f['Added By'] || '';

    const selectedTags = f.Tags || [];
    document.querySelectorAll('.tag-checkbox').forEach(cb => {
      cb.checked = selectedTags.includes(cb.value);
    });

    document.getElementById('addModal').classList.add('open');
  }

  // ---- EXTRACT FROM URL ----
  async function extractFromUrl() {
    const url = document.getElementById('recipeUrl').value.trim();
    if (!url) { showToast('Paste a URL first'); return; }

    const status = document.getElementById('extractStatus');
    status.className = 'extract-status';
    status.textContent = 'Extracting recipe...';

    try {
      const res = await fetch('/.netlify/functions/extract-recipe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      if (!res.ok) throw new Error('Extraction failed');
      const data = await res.json();

      document.getElementById('formName').value = data.name || '';
      document.getElementById('formDescription').value = data.description || '';
      document.getElementById('formPrepTime').value = data.prepTime || '';
      document.getElementById('formServings').value = data.servings || '';
      document.getElementById('formIngredients').value = data.ingredients || '';
      document.getElementById('formSteps').value = data.steps || '';
      document.getElementById('formNotes').value = data.notes || '';

      const suggested = data.suggestedTags || [];
      document.querySelectorAll('.tag-checkbox').forEach(cb => {
        cb.checked = suggested.includes(cb.value);
      });

      status.textContent = 'Recipe extracted! Review and edit before saving.';
    } catch (e) {
      status.className = 'extract-status error';
      status.textContent = 'Could not extract recipe. Try filling in manually.';
    }
  }

  // ---- SAVE RECIPE ----
  async function saveRecipe() {
    const name = document.getElementById('formName').value.trim();
    if (!name) { showToast('Recipe name is required'); return; }

    const selectedTags = [...document.querySelectorAll('.tag-checkbox:checked')].map(cb => cb.value);

    const fields = {
      'Name': name,
      'URL': document.getElementById('recipeUrl').value.trim() || undefined,
      'Description': document.getElementById('formDescription').value.trim() || undefined,
      'Prep Time': document.getElementById('formPrepTime').value.trim() || undefined,
      'Servings': document.getElementById('formServings').value.trim() || undefined,
      'Ingredients': document.getElementById('formIngredients').value.trim() || undefined,
      'Steps': document.getElementById('formSteps').value.trim() || undefined,
      'Notes': document.getElementById('formNotes').value.trim() || undefined,
      'Added By': document.getElementById('formAddedBy').value.trim() || undefined,
      'Tags': selectedTags.length ? selectedTags : undefined,
    };

    Object.keys(fields).forEach(k => fields[k] === undefined && delete fields[k]);

    try {
      if (editingRecipeId) {
        const res = await fetch('/.netlify/functions/recipes', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: editingRecipeId, ...fields })
        });
        if (!res.ok) throw new Error();
        showToast('Recipe updated!');
      } else {
        const res = await fetch('/.netlify/functions/recipes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fields)
        });
        if (!res.ok) throw new Error();
        showToast('Recipe added!');
      }

      closeAddModal();
      await loadRecipes();
    } catch (e) {
      showToast('Something went wrong. Try again.');
    }
  }

  // ---- DELETE RECIPE ----
  async function deleteRecipe(id) {
    if (!confirm('Delete this recipe? This cannot be undone.')) return;
    try {
      const res = await fetch(`/.netlify/functions/recipes?id=${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      closeDetailModal();
      showToast('Recipe deleted');
      await loadRecipes();
    } catch (e) {
      showToast('Could not delete recipe');
    }
  }

  // ---- UTILS ----
  function esc(str) {
    return (str || '').toString()
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('addModal').addEventListener('click', function(e) {
    if (e.target === this) closeAddModal();
  });
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeDetailModal();
  });
  document.getElementById('exportModal').addEventListener('click', function(e) {
    if (e.target === this) closeExportModal();
  });

  init();
</script>
</body>
</html>
